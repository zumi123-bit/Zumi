<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMUEL MARQUEZ</title>

<link rel="icon" href="image/sasu.ico">

<style>

/* RESET */
body {
  margin: 0;
  overflow-x: hidden;
  color: white;
  font-size: 28px;
  font-family: Arial, sans-serif;
}

/* VIDEO (👇 SOLO ESTO CAMBIADO) */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 120%;
  height: 120%;
  transform: translate(-50%, -50%);
  object-fit: contain;
  z-index: -2;
}

/* MENU */
.menu {
  position: fixed;
  top: 15px;
  right: 25px;
  z-index: 1000;
}

.links {
  display: flex;
  gap: 35px;
  margin: 0;
  padding: 14px 25px;
  border-radius: 40px;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(10px);
  list-style: none;
}

.links a {
  text-decoration: none;
  color: white;
  font-size: 20px;
  font-weight: 600;
  position: relative;
  transition: 0.3s;
}

.links a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -5px;
  width: 0%;
  height: 2px;
  background: red;
  transition: 0.3s;
}

.links a:hover::after {
  width: 100%;
}

/* DROPDOWN */
.dropdown { position: relative; }

.submenu {
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  position: absolute;
  top: 100%;
  right: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  padding: 10px;
  border-radius: 15px;
  list-style: none;
  min-width: 140px;
  transition: 0.3s;
}

.submenu li { padding: 6px 10px; }
.submenu a { font-size: 16px; }

.dropdown:hover .submenu {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* CONTENIDO */
.contenido {
  max-width: 600px;
  margin: 120px 0 0 5%;
}

/* TITULO */
.titulo {
  font-size: clamp(32px, 5vw, 60px);
  font-weight: bold;
  margin-bottom: 30px;

  opacity: 0;
  transform: scale(0.3);

  animation: animeImpacto 1s forwards,
             brilloAnime 2s infinite alternate;
}

@keyframes animeImpacto {
  0% { opacity: 0; transform: scale(0.3); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes brilloAnime {
  0% { text-shadow: 0 0 10px red; }
  100% { text-shadow: 0 0 30px red; }
}

/* BOTON MUSICA */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 30px;
  cursor: pointer;
  z-index: 1000;
}

/* CARRUSEL */
.carrusel {
  width: 100vw;
  overflow: hidden;
  margin-top: 40px;
  display: flex;
  justify-content: center;
}

.carrusel-track {
  display: flex;
  gap: 20px;
  transition: transform 0.4s ease;
  justify-content: center;
}

.carrusel img {
  width: 260px;
  height: 260px;
  object-fit: cover;
  border-radius: 15px;
}

/* FLECHAS */
.prev, .next {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 25px;
  padding: 10px;
  cursor: pointer;
  border-radius: 50%;
  z-index: 1000;
}

.prev { left: 10px; }
.next { right: 10px; }

.prev:hover, .next:hover {
  background: red;
}

/* 📱 MODO CELULAR */
@media (max-width: 768px) {

  body {
    font-size: 18px;
  }

  .links {
    gap: 15px;
    padding: 10px 15px;
  }

  .links a {
    font-size: 14px;
  }

  .contenido {
    margin: 100px 10px 0 10px;
    max-width: 100%;
  }

  .titulo {
    font-size: 28px;
    white-space: normal;
  }

  .libro {
    flex-direction: column;
    gap: 20px;
    margin: 20px;
  }

  .pagina {
    padding: 15px;
  }

  p {
    font-size: 16px;
  }

  /* imágenes o gifs */
  img {
    max-width: 90%;
    height: auto;
  }

  /* carrusel */
  .carrusel img {
    width: 180px;
    height: 180px;
  }

}
</style>
</head>

<body>

<nav class="menu">
<ul class="links">
<li><a href="index.html">Inicio</a></li>

<li class="dropdown">
<a href="#">índice</a>
<ul class="submenu">
<li><a href="parte1.html">origen</a></li>
<li><a href="parte2.html">formación</a></li>
<li><a href="parte3.html">dejar mi tierra</a></li>
<li><a href="parte4.html">comienzos</a></li>
<li><a href="parte5.html">reflexión</a></li>
</ul>
</li>

<li><a href="galería.html"> galería</a></li>
</ul>
</nav>

<button class="music-btn" id="musicToggle">🔊</button>

<audio id="musica" loop>
<source src="musica/0x.mp3">
</audio>

<div class="contenido">
  <div class="titulo">MIS FOTOS</div>
</div>

<div class="carrusel">
  <button class="prev">&#10094;</button>

  <div class="carrusel-track">
    <img src="image/1xx.jpg">
    <img src="image/2xx.webp">
    <img src="image/3xx.jpg">
    <img src="image/4xx.png">
    <img src="image/12xx.jpg">
  </div>

  <button class="next">&#10095;</button>
</div>

<video autoplay muted loop>
<source src="movi/7.mp4">
</video>

<script>
const track = document.querySelector(".carrusel-track");
const next = document.querySelector(".next");
const prev = document.querySelector(".prev");

const width = 280;

next.onclick = () => {
  track.style.transition = "0.4s";
  track.style.transform = `translateX(-${width}px)`;

  setTimeout(() => {
    track.appendChild(track.firstElementChild);
    track.style.transition = "none";
    track.style.transform = "translateX(0)";
  }, 400);
};

prev.onclick = () => {
  track.insertBefore(track.lastElementChild, track.firstElementChild);
  track.style.transition = "none";
  track.style.transform = `translateX(-${width}px)`;

  setTimeout(() => {
    track.style.transition = "0.4s";
    track.style.transform = "translateX(0)";
  }, 50);
};

/*  MUSICA */
const musica = document.getElementById("musica");
const toggle = document.getElementById("musicToggle");

let activo = false;
let musicaIniciada = false;

document.addEventListener("mousemove", () => {
  if (!musicaIniciada) {
    musica.volume = 0.5;
    musica.play().catch(()=>{});
    musicaIniciada = true;
    activo = true;
  }
});

toggle.onclick = () => {
  if(activo){
    musica.pause();
    toggle.innerText = "🔇";
  } else {
    musica.play().catch(()=>{});
    toggle.innerText = "🔊";
  }
  activo = !activo;
};
</script>

</body>
</html>
